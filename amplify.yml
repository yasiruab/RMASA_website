version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npx prisma generate
        - npm run build
        - cp -r public .next/standalone/public
        - cp -r .next/static .next/standalone/.next/static
        - cp .next/required-server-files.json .next/standalone/required-server-files.json
        - printf 'DATABASE_URL="%s"\nNEXTAUTH_SECRET="%s"\nNEXTAUTH_URL="%s"\n' "$DATABASE_URL" "$NEXTAUTH_SECRET" "$NEXTAUTH_URL" > .next/standalone/.env.production
  artifacts:
    baseDirectory: .next/standalone
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
