version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - |
          for i in 1 2 3 4 5 6; do
            npx prisma migrate deploy && break
            if [ $i -eq 6 ]; then
              echo "migrate deploy failed after 6 attempts"
              exit 1
            fi
            echo "migrate attempt $i failed; sleeping 15s before retry..."
            sleep 15
          done
        - npx prisma generate
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
