name: Unpaid booking reminders

on:
  schedule:
    # 00:30 UTC daily = 06:00 Sri Lanka time (UTC+05:30)
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/unpaid-reminders
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SITE_URL or CRON_SECRET secret in repo settings."
            exit 1
          fi
          curl -fsS -X POST "$SITE_URL/api/cron/unpaid-reminders" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 120
